<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casey's Home Bakes</title>
    <link rel="icon" href="img/casey/favicon.png" type="image/jpeg">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');
        
        body {
            background-color: #ac0201;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }
        
        .title {
            font-family: 'Pacifico', cursive; /* Using Pacifico as a fallback */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .polaroid-container {
            position: relative;
            width: 100%;
            height: 400px;
            margin: 0 auto;
            perspective: 1000px;
        }
        
        .polaroid {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 15px 15px 40px 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            width: 200px;
            max-width: 80%;
            z-index: 1;
        }
        
        .polaroid img {
            width: 100%;
            height: 170px;
            object-fit: cover;
        }
        
        .polaroid.front {
            z-index: 4;
        }
        
        .button {
            background-color: white;
            color: #ac0201;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <h1 class="title text-5xl md:text-6xl mb-6">Casey's Home Bakes</h1>
            <div class="flex flex-wrap justify-center gap-4 mb-8">
                <a href="https://www.instagram.com/caseybakerypa/" class="button inline-block">
                    Instagram
                </a>
                <a href="https://caseybakery.shop/loyalty" class="button inline-block">
                    Loyalty Program
                </a>
            </div>
        </header>
        
        <div class="polaroid-container">
            <div class="polaroid" data-index="0">
                <img src="img/casey/2025/image0.jpeg" alt="Casey's Bakery Item">
            </div>
            <div class="polaroid" data-index="1">
                <img src="img/casey/2025/image3.jpeg" alt="Casey's Bakery Item">
            </div>
            <div class="polaroid" data-index="2">
                <img src="img/casey/2025/image4.jpeg" alt="Casey's Bakery Item">
            </div>
            <div class="polaroid" data-index="3">
                <img src="img/casey/2025/image6.jpeg" alt="Casey's Bakery Item">
            </div>
        </div>
        
        <div class="text-center mt-8 text-sm opacity-80">
            <p>Tap or hover over photos to view</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const polaroids = document.querySelectorAll('.polaroid');
            const totalPolaroids = polaroids.length;
            let currentIndex = 0;
            
            // Function to apply random rotation and position
            function randomizePosition(element, zIndex) {
                const randomRotation = Math.random() * 14 - 7; // -7 to 7 degrees
                const randomXOffset = Math.random() * 40 - 20; // -20px to 20px
                const randomYOffset = Math.random() * 30 - 15; // -15px to 15px
                
                element.style.transform = `translate(calc(-50% + ${randomXOffset}px), calc(-50% + ${randomYOffset}px)) rotate(${randomRotation}deg)`;
                element.style.zIndex = zIndex;
            }
            
            // Initialize polaroids with random positions
            polaroids.forEach((polaroid, index) => {
                randomizePosition(polaroid, index + 1);
                
                // Add event listeners for both hover and click
                polaroid.addEventListener('mouseenter', bringToFront);
                polaroid.addEventListener('click', bringToFront);
                
                // Touch support for mobile
                polaroid.addEventListener('touchstart', function(e) {
                    e.preventDefault(); // Prevent default touch behavior
                    bringToFront.call(this);
                });
            });
            
            // Function to bring a polaroid to the front
            function bringToFront() {
                const clickedIndex = parseInt(this.getAttribute('data-index'));
                
                // Bring the clicked polaroid to front
                polaroids.forEach((p) => {
                    p.classList.remove('front');
                    p.style.zIndex = 1;
                });
                
                this.classList.add('front');
                this.style.zIndex = 10;
                this.style.transform = `translate(-50%, -50%) rotate(0deg) scale(1.1)`;
                
                // After animation, set current index
                currentIndex = clickedIndex;
                
                // Auto-return to random position after 3 seconds
                setTimeout(() => {
                    if (this.classList.contains('front')) {
                        this.classList.remove('front');
                        randomizePosition(this, clickedIndex + 1);
                    }
                }, 3000);
            }
            
            // Function to shuffle polaroids periodically
            function shufflePolaroids() {
                polaroids.forEach((polaroid, index) => {
                    if (!polaroid.classList.contains('front')) {
                        randomizePosition(polaroid, index + 1);
                    }
                });
                
                // Shuffle again after random interval (5-10 seconds)
                setTimeout(shufflePolaroids, Math.random() * 5000 + 5000);
            }
            
            // Start periodic shuffling
            setTimeout(shufflePolaroids, 5000);
        });
    </script>
</body>
</html>
