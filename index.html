<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casey's Home Bakes</title>
    <link rel="icon" href="img/casey/favicon.png" type="image/jpeg">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');
        
        body {
            background-color: #ac0201;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }
        
        .title {
            font-family: 'Pacifico', cursive;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .instagram-carousel {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            overflow: visible;
        }
        
        .carousel-inner {
            display: flex;
            transition: transform 0.3s ease;
            width: 100%;
        }
        
        .carousel-item {
            flex: 0 0 100%;
            position: relative;
        }
        
        .polaroid {
            background: white;
            padding: 12px 12px 35px 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            margin: 10px;
            transform: rotate(0deg);
            transition: transform 0.3s ease;
        }
        
        /* Stacked polaroid effect */
        .stacked-polaroids {
            position: relative;
        }
        
        .stacked-polaroids .polaroid:nth-child(1) {
            position: absolute;
            top: 3px;
            left: 3px;
            z-index: -1;
            transform: rotate(-3deg);
        }
        
        .stacked-polaroids .polaroid:nth-child(2) {
            position: absolute;
            top: 7px;
            left: -5px;
            z-index: -2;
            transform: rotate(2deg);
        }
        
        .polaroid img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }
        
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 15px;
        }
        
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }
        
        .dot.active {
            background-color: white;
            width: 6px;
        }
        
        .button {
            background-color: white;
            color: #ac0201;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 15px;
            display: inline-block;
            width: 180px;
            text-align: center;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.2);
        }
        
        .slide-instruction {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            opacity: 0.8;
        }
        
        .logo-img {
            max-width: 300px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-8">
        <!-- Desktop layout (logo/buttons on left, carousel on right) -->
        <div class="flex flex-col lg:flex-row lg:items-center">
            <!-- Left column (logo and buttons) -->
            <div class="lg:w-1/2 text-center lg:text-left mb-8 lg:mb-0">
                <img src="img/casey/casey-bakery.svg" alt="Casey's Home Bakes" class="logo-img mx-auto lg:mx-0">
                
                <div class="flex flex-col items-center lg:items-start">
                    <a href="https://www.instagram.com/caseybakerypa/" class="button">
                        Instagram
                    </a>
                    <a href="https://caseybakery.shop/loyalty" class="button">
                        Loyalty Program
                    </a>
                </div>
            </div>
            
            <!-- Right column (carousel) -->
            <div class="lg:w-1/2">
                <div class="instagram-carousel">
                    <div class="stacked-polaroids">
                        <!-- Background polaroids for stacked effect -->
                        <div class="polaroid">
                            <img src="img/casey/2025/image0.jpeg" alt="Casey's Bakery Item" loading="lazy">
                        </div>
                        <div class="polaroid">
                            <img src="img/casey/2025/image3.jpeg" alt="Casey's Bakery Item" loading="lazy">
                        </div>
                    </div>
                    
                    <div class="carousel-inner">
                        <div class="carousel-item">
                            <div class="polaroid" style="transform: rotate(-2deg);">
                                <img src="img/casey/2025/image0.jpeg" alt="Casey's Bakery Item" loading="lazy">
                            </div>
                        </div>
                        <div class="carousel-item">
                            <div class="polaroid" style="transform: rotate(1deg);">
                                <img src="img/casey/2025/image3.jpeg" alt="Casey's Bakery Item" loading="lazy">
                            </div>
                        </div>
                        <div class="carousel-item">
                            <div class="polaroid" style="transform: rotate(-1deg);">
                                <img src="img/casey/2025/image4.jpeg" alt="Casey's Bakery Item" loading="lazy">
                            </div>
                        </div>
                        <div class="carousel-item">
                            <div class="polaroid" style="transform: rotate(2deg);">
                                <img src="img/casey/2025/image6.jpeg" alt="Casey's Bakery Item" loading="lazy">
                            </div>
                        </div>
                    </div>
                    
                    <div class="slide-instruction">Swipe or drag to see more treats!</div>
                </div>
                
                <div class="carousel-dots">
                    <div class="dot active" data-index="0"></div>
                    <div class="dot" data-index="1"></div>
                    <div class="dot" data-index="2"></div>
                    <div class="dot" data-index="3"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const carouselInner = document.querySelector('.carousel-inner');
            const carouselItems = document.querySelectorAll('.carousel-item');
            const dots = document.querySelectorAll('.dot');
            
            let currentIndex = 0;
            let startX, moveX;
            let itemWidth = carouselItems[0].clientWidth;
            let autoSlideInterval;
            let isDragging = false;
            
            // Update dots to show current slide
            function updateDots() {
                dots.forEach((dot, index) => {
                    if (index === currentIndex) {
                        dot.classList.add('active');
                    } else {
                        dot.classList.remove('active');
                    }
                });
            }
            
            // Update carousel position
            function updateCarousel() {
                carouselInner.style.transform = `translateX(-${currentIndex * 100}%)`;
                updateDots();
            }
            
            // Go to specific slide
            function goToSlide(index) {
                if (index < 0) {
                    index = carouselItems.length - 1;
                } else if (index >= carouselItems.length) {
                    index = 0;
                }
                currentIndex = index;
                updateCarousel();
            }
            
            // Start automatic slideshow
            function startAutoSlide() {
                autoSlideInterval = setInterval(() => {
                    goToSlide(currentIndex + 1);
                }, 5000);
            }
            
            // Stop automatic slideshow
            function stopAutoSlide() {
                clearInterval(autoSlideInterval);
            }
            
            // Event listeners for dots
            dots.forEach(dot => {
                dot.addEventListener('click', function() {
                    const index = parseInt(this.getAttribute('data-index'));
                    goToSlide(index);
                    
                    // Reset timer when manually changing slides
                    stopAutoSlide();
                    startAutoSlide();
                });
            });
            
            // Touch events for swiping on mobile
            carouselInner.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                // Pause transition during touch
                carouselInner.style.transition = 'none';
                stopAutoSlide();
            });
            
            carouselInner.addEventListener('touchmove', (e) => {
                if (!startX) return;
                
                moveX = e.touches[0].clientX;
                const diffX = startX - moveX;
                
                // Calculate how far to slide based on touch movement
                const offsetX = -(currentIndex * itemWidth) - diffX;
                carouselInner.style.transform = `translateX(${offsetX / itemWidth * 100}%)`;
            });
            
            carouselInner.addEventListener('touchend', () => {
                carouselInner.style.transition = 'transform 0.3s ease';
                
                if (!startX || !moveX) return;
                
                const diffX = startX - moveX;
                
                // If swipe distance is greater than 50px, change slide
                if (Math.abs(diffX) > 50) {
                    if (diffX > 0) {
                        goToSlide(currentIndex + 1);
                    } else {
                        goToSlide(currentIndex - 1);
                    }
                } else {
                    // If swipe is not decisive, return to current slide
                    updateCarousel();
                }
                
                startX = null;
                moveX = null;
                
                // Restart auto slide after interaction
                startAutoSlide();
            });
            
            // Mouse events for dragging on desktop
            carouselInner.addEventListener('mousedown', (e) => {
                e.preventDefault();
                startX = e.clientX;
                isDragging = true;
                // Pause transition during drag
                carouselInner.style.transition = 'none';
                stopAutoSlide();
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                
                moveX = e.clientX;
                const diffX = startX - moveX;
                
                // Calculate how far to slide based on mouse movement
                const offsetX = -(currentIndex * itemWidth) - diffX;
                carouselInner.style.transform = `translateX(${offsetX / itemWidth * 100}%)`;
            });
            
            document.addEventListener('mouseup', () => {
                if (!isDragging) return;
                
                isDragging = false;
                carouselInner.style.transition = 'transform 0.3s ease';
                
                if (!startX || !moveX) return;
                
                const diffX = startX - moveX;
                
                // If drag distance is greater than 50px, change slide
                if (Math.abs(diffX) > 50) {
                    if (diffX > 0) {
                        goToSlide(currentIndex + 1);
                    } else {
                        goToSlide(currentIndex - 1);
                    }
                } else {
                    // If drag is not decisive, return to current slide
                    updateCarousel();
                }
                
                startX = null;
                moveX = null;
                
                // Restart auto slide after interaction
                startAutoSlide();
            });
            
            // Update item width on window resize
            window.addEventListener('resize', () => {
                itemWidth = carouselItems[0].clientWidth;
                updateCarousel();
            });
            
            // Initialize
            updateCarousel();
            startAutoSlide();
            
            // Random rotation for polaroids on load
            document.querySelectorAll('.polaroid').forEach(polaroid => {
                const randomRotation = Math.random() * 6 - 3; // -3 to 3 degrees
                polaroid.style.transform = `rotate(${randomRotation}deg)`;
            });
        });
    </script>
</body>
</html>
