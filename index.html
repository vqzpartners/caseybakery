<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casey's Home Bakes</title>
    <link rel="icon" href="img/casey/favicon.png" type="image/jpeg">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <!-- Added Google Fonts for Roboto Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #ac0201;
            color: white;
            font-family: 'Roboto Mono', monospace; /* Changed font to Roboto Mono */
            overflow-x: hidden;
        }
        
        .instagram-carousel {
            position: relative;
            width: 100%;
            max-width: 500px; /* Reduced from 600px to make polaroid smaller */
            margin: 0 auto;
            overflow: hidden;
        }
        
        .carousel-inner {
            display: flex;
            transition: transform 0.3s ease;
            width: 100%;
        }
        
        .carousel-item {
            flex: 0 0 100%;
            position: relative;
        }
        
        .polaroid {
            background: white;
            padding: 10px 10px 30px 10px; /* Reduced padding to make polaroid smaller */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            margin: 10px;
            transform: rotate(0deg);
            transition: transform 0.3s ease;
        }
        
        .polaroid img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }
        
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 15px;
            margin-bottom: 15px; /* Added margin to push dots away from instruction text */
        }
        
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }
        
        .dot.active {
            background-color: white;
            width: 6px;
        }
        
        .buttons-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        
        @media (min-width: 1024px) {
            .buttons-container {
                align-items: center;
            }
        }
        
        .button {
            background-color: white;
            color: #ac0201;
            padding: 10px 0;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: block;
            width: 220px; /* Increased width from 180px to make buttons wider */
            text-align: center;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.2);
        }
        
        .slide-instruction {
            text-align: center;
            margin-top: 30px; /* Increased to ensure visibility in mobile */
            font-size: 14px;
            opacity: 0.8;
            position: relative; /* Ensure it's above the dots */
            z-index: 5;
        }
        
        .logo-img {
            max-width: 200px;
            margin-bottom: 20px;
            margin-left: auto;
            margin-right: auto;
        }
        
        /* Updated stacked polaroids positioning */
        .carousel-container {
            position: relative;
            max-width: 500px; /* Match with carousel to make polaroid smaller */
            margin: 0 auto;
        }
        
        .stacked-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        
        .stacked-background .polaroid-bg {
            position: absolute;
            background: white;
            padding: 10px 10px 30px 10px; /* Reduced padding */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        /* Adjusted positioning to be more concentrated */
        .stacked-background .polaroid-bg:nth-child(1) {
            top: 10px;
            left: 7%;
            transform: rotate(-4deg);
            width: 87%;
            height: 87%;
        }
        
        .stacked-background .polaroid-bg:nth-child(2) {
            top: 5px;
            left: 5%;
            transform: rotate(3deg);
            width: 87%;
            height: 87%;
        }
        
        /* Footer style */
        .footer {
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
            font-size: 12px;
            opacity: 0.8;
        }
        
        /* Media query for mobile views */
        @media (max-width: 768px) {
            .slide-instruction {
                position: relative;
                margin-top: 35px; /* Extra space above to avoid overlap with dots */
                margin-bottom: 25px; /* Extra space below for dots */
                z-index: 10; /* Ensure text appears above the dots */
            }
            
            .carousel-dots {
                position: relative;
                z-index: 5;
                margin-top: 5px; /* Position dots below the instruction text */
            }
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-8">
        <!-- Desktop layout (adjusted for better centering) -->
        <div class="flex flex-col lg:flex-row lg:items-center lg:justify-center">
            <!-- Left column (logo and buttons) - adjusted spacing -->
            <div class="lg:w-1/3 text-center mb-8 lg:mb-0 lg:mr-8">
                <img src="img/casey/casey-bakery.svg" alt="Casey's Home Bakes" class="logo-img mx-auto">
                
                <div class="buttons-container">
                    <a href="https://caseybakery.shop/drops" class="button">
                        Sobre los Drops
                    </a>
                    <a href="https://www.instagram.com/caseybakerypa/" class="button">
                        Instagram
                    </a>
                    <a href="https://caseybakery.shop/loyalty" class="button">
                        Loyalty Program
                    </a>
                </div>
            </div>
            
            <!-- Right column (carousel) - made smaller -->
            <div class="lg:w-1/2">
                <div class="carousel-container">
                    <!-- Background stacked polaroids -->
                    <div class="stacked-background">
                        <div class="polaroid-bg"></div>
                        <div class="polaroid-bg"></div>
                    </div>
                    
                    <div class="instagram-carousel">
                        <div class="carousel-inner">
                            <div class="carousel-item">
                                <div class="polaroid" style="transform: rotate(-2deg);">
                                    <img src="img/casey/2025/image0.jpeg" alt="Casey's Bakery Item" loading="lazy">
                                </div>
                            </div>
                            <div class="carousel-item">
                                <div class="polaroid" style="transform: rotate(1deg);">
                                    <img src="img/casey/2025/image3.jpeg" alt="Casey's Bakery Item" loading="lazy">
                                </div>
                            </div>
                            <div class="carousel-item">
                                <div class="polaroid" style="transform: rotate(-1deg);">
                                    <img src="img/casey/2025/hellodollies.jpg" alt="Casey's Bakery Item" loading="lazy">
                                </div>
                            </div>
                        </div>
                        
                        <div class="slide-instruction">desliza para ver más imagenes</div>
                        
                        <div class="carousel-dots">
                            <div class="dot active" data-index="0"></div>
                            <div class="dot" data-index="1"></div>
                            <div class="dot" data-index="2"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Added footer -->
<div class="footer">
    &copy; <span id="year"></span> Casey Home Bakes
    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>
</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const carouselInner = document.querySelector('.carousel-inner');
            const carouselItems = document.querySelectorAll('.carousel-item');
            const dots = document.querySelectorAll('.dot');
            
            let currentIndex = 0;
            let startX, moveX;
            let itemWidth = carouselItems[0].clientWidth;
            let autoSlideInterval;
            let isDragging = false;
            
            // Update dots to show current slide
            function updateDots() {
                dots.forEach((dot, index) => {
                    if (index === currentIndex) {
                        dot.classList.add('active');
                    } else {
                        dot.classList.remove('active');
                    }
                });
            }
            
            // Update carousel position
            function updateCarousel() {
                carouselInner.style.transform = `translateX(-${currentIndex * 100}%)`;
                updateDots();
            }
            
            // Go to specific slide
            function goToSlide(index) {
                if (index < 0) {
                    index = carouselItems.length - 1;
                } else if (index >= carouselItems.length) {
                    index = 0;
                }
                currentIndex = index;
                updateCarousel();
            }
            
            // Start automatic slideshow
            function startAutoSlide() {
                autoSlideInterval = setInterval(() => {
                    goToSlide(currentIndex + 1);
                }, 5000);
            }
            
            // Stop automatic slideshow
            function stopAutoSlide() {
                clearInterval(autoSlideInterval);
            }
            
            // Event listeners for dots
            dots.forEach(dot => {
                dot.addEventListener('click', function() {
                    const index = parseInt(this.getAttribute('data-index'));
                    goToSlide(index);
                    
                    // Reset timer when manually changing slides
                    stopAutoSlide();
                    startAutoSlide();
                });
            });
            
            // Touch events for swiping on mobile
            carouselInner.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                // Pause transition during touch
                carouselInner.style.transition = 'none';
                stopAutoSlide();
            });
            
            carouselInner.addEventListener('touchmove', (e) => {
                if (!startX) return;
                
                moveX = e.touches[0].clientX;
                const diffX = startX - moveX;
                
                // Calculate how far to slide based on touch movement
                const offsetX = -(currentIndex * itemWidth) - diffX;
                carouselInner.style.transform = `translateX(${offsetX / itemWidth * 100}%)`;
            });
            
            carouselInner.addEventListener('touchend', () => {
                carouselInner.style.transition = 'transform 0.3s ease';
                
                if (!startX || !moveX) return;
                
                const diffX = startX - moveX;
                
                // If swipe distance is greater than 50px, change slide
                if (Math.abs(diffX) > 50) {
                    if (diffX > 0) {
                        goToSlide(currentIndex + 1);
                    } else {
                        goToSlide(currentIndex - 1);
                    }
                } else {
                    // If swipe is not decisive, return to current slide
                    updateCarousel();
                }
                
                startX = null;
                moveX = null;
                
                // Restart auto slide after interaction
                startAutoSlide();
            });
            
            // Mouse events for dragging on desktop
            carouselInner.addEventListener('mousedown', (e) => {
                e.preventDefault();
                startX = e.clientX;
                isDragging = true;
                // Pause transition during drag
                carouselInner.style.transition = 'none';
                stopAutoSlide();
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                
                moveX = e.clientX;
                const diffX = startX - moveX;
                
                // Calculate how far to slide based on mouse movement
                const offsetX = -(currentIndex * itemWidth) - diffX;
                carouselInner.style.transform = `translateX(${offsetX / itemWidth * 100}%)`;
            });
            
            document.addEventListener('mouseup', () => {
                if (!isDragging) return;
                
                isDragging = false;
                carouselInner.style.transition = 'transform 0.3s ease';
                
                if (!startX || !moveX) return;
                
                const diffX = startX - moveX;
                
                // If drag distance is greater than 50px, change slide
                if (Math.abs(diffX) > 50) {
                    if (diffX > 0) {
                        goToSlide(currentIndex + 1);
                    } else {
                        goToSlide(currentIndex - 1);
                    }
                } else {
                    // If drag is not decisive, return to current slide
                    updateCarousel();
                }
                
                startX = null;
                moveX = null;
                
                // Restart auto slide after interaction
                startAutoSlide();
            });
            
            // Update item width on window resize
            window.addEventListener('resize', () => {
                itemWidth = carouselItems[0].clientWidth;
                updateCarousel();
            });
            
            // Initialize
            updateCarousel();
            startAutoSlide();
            
            // Random rotation for polaroids on load
            document.querySelectorAll('.polaroid').forEach(polaroid => {
                const randomRotation = Math.random() * 4 - 2; // -2 to 2 degrees
                polaroid.style.transform = `rotate(${randomRotation}deg)`;
            });
        });
    </script>
</body>
</html>
