<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casey's Home Bakes</title>
    <link rel="icon" href="img/casey/favicon.png" type="image/jpeg">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');
        
        body {
            background-color: #ac0201;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }
        
        .title {
            font-family: 'Pacifico', cursive; /* Using Pacifico as a fallback */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .instagram-carousel {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 3px;
        }
        
        .carousel-inner {
            display: flex;
            transition: transform 0.3s ease;
            width: 100%;
        }
        
        .carousel-item {
            flex: 0 0 100%;
            position: relative;
        }
        
        .polaroid {
            background: white;
            padding: 12px 12px 35px 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            margin: 10px;
            transform: rotate(0deg);
            transition: transform 0.3s ease;
        }
        
        .polaroid img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }
        
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 15px;
        }
        
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }
        
        .dot.active {
            background-color: white;
            width: 6px;
        }
        
        .carousel-nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }
        
        .nav-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            margin: 0 10px;
        }
        
        .button {
            background-color: white;
            color: #ac0201;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <h1 class="title text-5xl md:text-6xl mb-6">Casey's Home Bakes</h1>
            <div class="flex flex-wrap justify-center gap-4 mb-8">
                <a href="https://www.instagram.com/caseybakerypa/" class="button inline-block">
                    Instagram
                </a>
                <a href="https://caseybakery.shop/loyalty" class="button inline-block">
                    Loyalty Program
                </a>
            </div>
        </header>
        
        <div class="instagram-carousel">
            <div class="carousel-inner">
                <div class="carousel-item">
                    <div class="polaroid" style="transform: rotate(-2deg);">
                        <img src="img/casey/2025/image0.jpeg" alt="Casey's Bakery Item" loading="lazy">
                    </div>
                </div>
                <div class="carousel-item">
                    <div class="polaroid" style="transform: rotate(1deg);">
                        <img src="img/casey/2025/image3.jpeg" alt="Casey's Bakery Item" loading="lazy">
                    </div>
                </div>
                <div class="carousel-item">
                    <div class="polaroid" style="transform: rotate(-1deg);">
                        <img src="img/casey/2025/image4.jpeg" alt="Casey's Bakery Item" loading="lazy">
                    </div>
                </div>
                <div class="carousel-item">
                    <div class="polaroid" style="transform: rotate(2deg);">
                        <img src="img/casey/2025/image6.jpeg" alt="Casey's Bakery Item" loading="lazy">
                    </div>
                </div>
            </div>
            
            <div class="carousel-nav">
                <div class="nav-btn prev">❮</div>
                <div class="nav-btn next">❯</div>
            </div>
        </div>
        
        <div class="carousel-dots">
            <div class="dot active" data-index="0"></div>
            <div class="dot" data-index="1"></div>
            <div class="dot" data-index="2"></div>
            <div class="dot" data-index="3"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const carouselInner = document.querySelector('.carousel-inner');
            const carouselItems = document.querySelectorAll('.carousel-item');
            const dots = document.querySelectorAll('.dot');
            const prevBtn = document.querySelector('.nav-btn.prev');
            const nextBtn = document.querySelector('.nav-btn.next');
            
            let currentIndex = 0;
            let startX, moveX;
            let itemWidth = carouselItems[0].clientWidth;
            
            // Update dots to show current slide
            function updateDots() {
                dots.forEach((dot, index) => {
                    if (index === currentIndex) {
                        dot.classList.add('active');
                    } else {
                        dot.classList.remove('active');
                    }
                });
            }
            
            // Update carousel position
            function updateCarousel() {
                carouselInner.style.transform = `translateX(-${currentIndex * 100}%)`;
                updateDots();
            }
            
            // Go to specific slide
            function goToSlide(index) {
                if (index < 0) {
                    index = carouselItems.length - 1;
                } else if (index >= carouselItems.length) {
                    index = 0;
                }
                currentIndex = index;
                updateCarousel();
            }
            
            // Event listeners for dots
            dots.forEach(dot => {
                dot.addEventListener('click', function() {
                    const index = parseInt(this.getAttribute('data-index'));
                    goToSlide(index);
                });
            });
            
            // Event listeners for buttons
            prevBtn.addEventListener('click', () => {
                goToSlide(currentIndex - 1);
            });
            
            nextBtn.addEventListener('click', () => {
                goToSlide(currentIndex + 1);
            });
            
            // Touch events for swiping
            carouselInner.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                // Pause transition during touch
                carouselInner.style.transition = 'none';
            });
            
            carouselInner.addEventListener('touchmove', (e) => {
                if (!startX) return;
                
                moveX = e.touches[0].clientX;
                const diffX = startX - moveX;
                
                // Calculate how far to slide based on touch movement
                const offsetX = -(currentIndex * itemWidth) - diffX;
                carouselInner.style.transform = `translateX(${offsetX / itemWidth * 100}%)`;
            });
            
            carouselInner.addEventListener('touchend', () => {
                carouselInner.style.transition = 'transform 0.3s ease';
                
                if (!startX || !moveX) return;
                
                const diffX = startX - moveX;
                
                // If swipe distance is greater than 50px, change slide
                if (Math.abs(diffX) > 50) {
                    if (diffX > 0) {
                        goToSlide(currentIndex + 1);
                    } else {
                        goToSlide(currentIndex - 1);
                    }
                } else {
                    // If swipe is not decisive, return to current slide
                    updateCarousel();
                }
                
                startX = null;
                moveX = null;
            });
            
            // Update item width on window resize
            window.addEventListener('resize', () => {
                itemWidth = carouselItems[0].clientWidth;
                updateCarousel();
            });
            
            // Initialize
            updateCarousel();
            
            // Random rotation for polaroids on load
            document.querySelectorAll('.polaroid').forEach(polaroid => {
                const randomRotation = Math.random() * 6 - 3; // -3 to 3 degrees
                polaroid.style.transform = `rotate(${randomRotation}deg)`;
            });
        });
    </script>
</body>
</html>
