<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casey's Bakery - Nuevos Drops</title>
    <link rel="icon" href="img/casey/favicon.png" type="image/jpeg">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #ac0201;
            color: white;
            font-family: 'Roboto Mono', monospace;
            overflow-x: hidden;
        }
        
        .drop-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .drop-item {
            position: relative;
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        
        .drop-item:hover {
            transform: translateY(-5px);
        }
        
        .drop-image-container {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
        }
        
        .drop-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .drop-label {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 10px;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
        }
        
        .drop-timer {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
        }
        
        .drop-content {
            padding: 12px;
            background-color: white;
            color: black;
        }
        
        .drop-title {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #ac0201;
        }
        
        .drop-button {
            background-color: #ac0201;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            display: block;
            width: 100%;
            margin-top: 8px;
        }
        
        .drop-button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.2);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 400px;
            width: 90%;
            color: black;
            position: relative;
        }
        
        .close-button {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .logo-header {
            display: flex;
            justify-content: center;
            padding: 20px 0;
        }
        
        .logo-img {
            max-width: 90px;
        }
        
        .footer {
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
            font-size: 12px;
            opacity: 0.8;
        }
        
        .newsletter-form-container {
            width: 100%;
        }

        /* Tablet screens (768px to 1023px) */
@media (max-width: 1023px) {
    .drop-title {
        font-size: 11px;
    }
}

/* Mobile screens (below 768px) */
@media (max-width: 767px) {
    .drop-title {
        font-size: 11px;
    }
    .drop-grid { grid-template-columns: repeat(2, 1fr);
            
    }
}
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-8">
        <div class="logo-header">
            <img src="img/casey/casey-bakery.svg" alt="Casey's Home Bakes" class="logo-img">
        </div>
        
        <h1 class="text-center text-3xl font-bold mb-8">NUEVOS DROPS</h1>
        
        <div id="drops-container" class="drop-grid">
            <!-- Drop items will be dynamically generated here -->
        </div>
        
        <!-- Waitlist Modal -->
        <div id="waitlistModal" class="modal">
            <div class="modal-content">
                <span class="close-button">&times;</span>
                <h2 class="text-xl font-bold mb-4 text-center">¡No te lo pierdas!</h2>
                <p class="mb-4 text-center">Sé de los primeros en descubrir nuestros drops!</p>
                
                <div class="newsletter-form-container">
                    <form class="newsletter-form" action="https://app.loops.so/api/newsletter-form/cm8yuaee103a1mzpkubdnxtyw" method="POST" style="display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%;">
                        <input class="newsletter-form-input" name="firstName" type="text" placeholder="Tu nombre" required style="font-family: Roboto, sans-serif; color: rgb(0, 0, 0); font-size: 14px; margin: 0px 0px 10px; width: 100%; max-width: 300px; min-width: 100px; background: rgb(255, 255, 255); border: 1px solid rgb(209, 213, 219); box-sizing: border-box; box-shadow: rgba(0, 0, 0, 0.05) 0px 1px 2px; border-radius: 6px; padding: 8px 12px;">
                        
                        <input class="newsletter-form-input" name="email" type="email" placeholder="Tu correo" required style="font-family: Roboto, sans-serif; color: rgb(0, 0, 0); font-size: 14px; margin: 0px 0px 10px; width: 100%; max-width: 300px; min-width: 100px; background: rgb(255, 255, 255); border: 1px solid rgb(209, 213, 219); box-sizing: border-box; box-shadow: rgba(0, 0, 0, 0.05) 0px 1px 2px; border-radius: 6px; padding: 8px 12px;">
                        
                        <input type="hidden" name="mailingLists" value="cm8yuhcd801nv0iylbpd67yx8">
                        <input type="hidden" id="dropNameField" name="dropName" value="">
                        
                        <button type="submit" class="newsletter-form-button" style="background: rgb(172, 2, 1); font-size: 14px; color: rgb(255, 255, 255); font-family: Roboto, sans-serif; display: flex; width: 100%; max-width: 300px; white-space: normal; height: 38px; align-items: center; justify-content: center; flex-direction: row; padding: 9px 17px; box-shadow: rgba(0, 0, 0, 0.05) 0px 1px 2px; border-radius: 6px; text-align: center; font-style: normal; font-weight: 500; line-height: 20px; border: none; cursor: pointer;">Notifícame</button>
                        
                        <button type="button" class="newsletter-loading-button" style="background: rgb(172, 2, 1); font-size: 14px; color: rgb(255, 255, 255); font-family: Roboto, sans-serif; display: none; width: 100%; max-width: 300px; white-space: normal; height: 38px; align-items: center; justify-content: center; flex-direction: row; padding: 9px 17px; box-shadow: rgba(0, 0, 0, 0.05) 0px 1px 2px; border-radius: 6px; text-align: center; font-style: normal; font-weight: 500; line-height: 20px; border: none; cursor: pointer;">Cargando...</button>
                    </form>
                    
                    <div class="newsletter-success" style="display: none; align-items: center; justify-content: center; width: 100%;">
                        <p class="newsletter-success-message" style="font-family: Inter, sans-serif; color: rgb(0, 0, 0); font-size: 14px; text-align: center;">Gracias! Te notificarémos cuando nuevos drops sean lanzados.</p>
                    </div>
                    
                    <div class="newsletter-error" style="display: none; align-items: center; justify-content: center; width: 100%;">
                        <p class="newsletter-error-message" style="font-family: Inter, sans-serif; color: rgb(185, 28, 28); font-size: 14px; text-align: center;">Oops! Algo no salio bien, intenta otra vez.</p>
                    </div>
                    
                    <button class="newsletter-back-button" type="button" style="color:#6b7280;font: 14px, Inter, sans-serif;margin:10px auto;text-align:center;display:none;background:transparent;border:none;cursor:pointer" onmouseout="this.style.textDecoration='none'" onmouseover="this.style.textDecoration='underline'">&larr; Regresar</button>
                </div>
            </div>
        </div>
        
        <!-- Footer -->
<div class="footer">
    &copy; <span id="year"></span> Casey Home Bakes
    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>
</div>
    </div>

    <!-- Load the drops data first -->
    <script src="js/drops.js"></script>
    
    <!-- Main script -->
    <script src="js/main.js"></script>
</body>
</html>
